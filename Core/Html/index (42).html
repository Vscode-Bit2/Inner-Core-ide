<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atom Web IDE</title>
    <style>
        /* Global Reset and Mobile Optimizations */
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Allow selection inside Ace Editor and Output Terminal */
        .ace_editor, .ace_editor *, #terminal-output, #terminal-output * {
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        /* VS Code UI Font for the interface */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            background-color: #282c34; 
            color: #abb2bf; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", system-ui, sans-serif;
            overflow: hidden;
        }

        /* Layout Structure */
        #workspace {
            display: flex;
            flex-grow: 1;
            height: calc(100% - 30px);
        }

        /* Sidebar Structure */
        #sidebar {
            width: 250px;
            min-width: 200px;
            background-color: #21252b; 
            border-right: 1px solid #181a1f;
            display: flex;
            flex-direction: column;
        }

        #sidebar-header {
            padding: 10px 15px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #9da5b4;
            border-bottom: 1px solid #181a1f;
        }

        #file-tree {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        /* Tree Items */
        .tree-item-container { display: flex; flex-direction: column; }

        .tree-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 15px;
            cursor: pointer;
            font-size: 13px;
            color: #9da5b4;
        }

        .tree-item:hover { background-color: #2c313a; color: #d7dae0; }
        .tree-item.active { background-color: #323842; color: #ffffff; }

        .item-name {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .icon {
            font-family: "Consolas", "Courier New", monospace;
            font-weight: bold;
            color: #528bff; 
        }

        .icon-folder { color: #e5c07b; }

        .item-actions { display: flex; gap: 4px; }

        .action-btn {
            background: none;
            border: none;
            color: #636d83;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .action-btn:hover { background-color: #3e4451; color: #abb2bf; }

        .children-container { padding-left: 15px; }

        /* Main Editor Area */
        #main-pane {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            background-color: #282c34;
            width: calc(100% - 250px);
        }

        /* Atom Tabs Bar */
        #tab-bar {
            height: 35px;
            background-color: #21252b;
            display: flex;
            align-items: flex-end;
            padding-left: 10px;
            border-bottom: 1px solid #181a1f;
            overflow-x: auto;
            flex-shrink: 0;
        }

        #tab-bar::-webkit-scrollbar { height: 4px; }
        #tab-bar::-webkit-scrollbar-thumb { background: #3e4451; }

        .atom-tab {
            height: 30px;
            background-color: #2c313a;
            color: #9da5b4;
            padding: 0 15px;
            display: flex;
            align-items: center;
            font-size: 13px;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            margin-right: 2px;
            cursor: pointer;
            border-top: 1px solid transparent;
        }

        .atom-tab.active {
            background-color: #282c34;
            color: #d7dae0;
            border-top: 1px solid #528bff;
            z-index: 2;
        }

        .tab-close {
            margin-left: 10px;
            color: #636d83;
            font-size: 14px;
            font-weight: bold;
        }

        .tab-close:hover { color: #e06c75; }

        /* Editor Container */
        #editor-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
        }

        /* Output Pane (Terminal & Fake Browser) */
        #output-pane {
            height: 250px;
            background-color: #21252b;
            border-top: 1px solid #181a1f;
            display: none; /* Hidden by default */
            flex-direction: column;
            flex-shrink: 0;
        }

        #output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background-color: #181a1f;
            font-size: 12px;
            font-weight: bold;
            color: #9da5b4;
        }

        #close-output {
            cursor: pointer;
            color: #e06c75;
            font-size: 14px;
        }

        #terminal-output {
            flex-grow: 1;
            padding: 10px;
            margin: 0;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 13px;
            color: #d19a66;
            overflow-y: auto;
            display: none;
            white-space: pre-wrap;
            background-color: #282c34;
        }

        #browser-preview {
            flex-grow: 1;
            width: 100%;
            border: none;
            background-color: #ffffff;
            display: none;
        }

        /* Atom Status Bar */
        #status-bar {
            height: 30px;
            background-color: #21252b;
            border-top: 1px solid #181a1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 12px;
            color: #9da5b4;
            flex-shrink: 0;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Run Button */
        #run-btn {
            background-color: #98c379;
            color: #282c34;
            border: none;
            padding: 3px 12px;
            font-weight: bold;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
            display: none; /* Hidden until file is open */
        }

        #run-btn:hover {
            background-color: #7cb654;
        }
    </style>
</head>
<body>

    <div id="workspace">
        <div id="sidebar">
            <div id="sidebar-header">Project</div>
            <div id="file-tree"></div>
        </div>

        <div id="main-pane">
            <div id="tab-bar"></div>
            <div id="editor-container"></div>
            
            <div id="output-pane">
                <div id="output-header">
                    <span id="output-title">Terminal</span>
                    <span id="close-output">X</span>
                </div>
                <pre id="terminal-output"></pre>
                <iframe id="browser-preview" sandbox="allow-scripts allow-modals"></iframe>
            </div>
        </div>
    </div>

    <div id="status-bar">
        <div class="status-item" id="status-left">
            <span id="status-filename">No file selected</span>
        </div>
        <div class="status-item" id="status-right">
            <button id="run-btn">Run File</button>
            <span id="status-language">Plain Text</span>
            <span>UTF-8</span>
            <span>Atom VFS</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());

        let vfs = { id: 'root', name: 'Atom Workspace', type: 'folder', expanded: true, children: [] };
        let fileContents = {};
        let openTabs = [];
        let activeFileId = null;
        let editorInstance = null;
        let pistonRuntimes = {};

        // Fetch available languages/versions for C++ and Python from Piston API on load
        fetch('https://emkc.org/api/v2/piston/runtimes')
            .then(res => res.json())
            .then(data => {
                data.forEach(r => { pistonRuntimes[r.language] = r.version; });
            }).catch(err => console.log("Piston API load error"));

        function generateId() { return 'id_' + Math.random().toString(36).substr(2, 9); }

        function renderTree() {
            const treeContainer = document.getElementById('file-tree');
            treeContainer.innerHTML = '';
            treeContainer.appendChild(createTreeNode(vfs));
        }

        function createTreeNode(node) {
            const container = document.createElement('div');
            container.className = 'tree-item-container';

            const itemDiv = document.createElement('div');
            itemDiv.className = 'tree-item' + (activeFileId === node.id ? ' active' : '');
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'item-name';
            
            const iconSpan = document.createElement('span');
            iconSpan.className = 'icon ' + (node.type === 'folder' ? 'icon-folder' : 'icon-file');
            iconSpan.innerText = node.type === 'folder' ? (node.expanded ? 'v' : '>') : '</>';
            
            const textSpan = document.createElement('span');
            textSpan.innerText = node.name;

            nameDiv.appendChild(iconSpan);
            nameDiv.appendChild(textSpan);
            itemDiv.appendChild(nameDiv);

            itemDiv.onclick = (e) => {
                e.stopPropagation();
                if (node.type === 'folder') {
                    node.expanded = !node.expanded;
                    renderTree();
                } else {
                    openFile(node.id);
                }
            };

            if (node.type === 'folder') {
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'item-actions';

                const addFileBtn = document.createElement('button');
                addFileBtn.className = 'action-btn';
                addFileBtn.innerText = '+F';
                addFileBtn.onclick = (e) => { e.stopPropagation(); createNewNode(node, 'file'); };

                const addFolderBtn = document.createElement('button');
                addFolderBtn.className = 'action-btn';
                addFolderBtn.innerText = '+D';
                addFolderBtn.onclick = (e) => { e.stopPropagation(); createNewNode(node, 'folder'); };

                actionsDiv.appendChild(addFileBtn);
                actionsDiv.appendChild(addFolderBtn);
                itemDiv.appendChild(actionsDiv);
            }

            container.appendChild(itemDiv);

            if (node.type === 'folder' && node.expanded && node.children.length > 0) {
                const childrenDiv = document.createElement('div');
                childrenDiv.className = 'children-container';
                node.children.forEach(child => childrenDiv.appendChild(createTreeNode(child)));
                container.appendChild(childrenDiv);
            }

            return container;
        }

        function renderTabs() {
            const tabBar = document.getElementById('tab-bar');
            tabBar.innerHTML = '';

            openTabs.forEach(tabId => {
                const node = findNodeById(vfs, tabId);
                if (!node) return;

                const tabDiv = document.createElement('div');
                tabDiv.className = 'atom-tab' + (activeFileId === tabId ? ' active' : '');
                
                const titleSpan = document.createElement('span');
                titleSpan.innerText = node.name;
                
                const closeBtn = document.createElement('span');
                closeBtn.className = 'tab-close';
                closeBtn.innerText = 'x';
                closeBtn.onclick = (e) => {
                    e.stopPropagation();
                    closeTab(tabId);
                };

                tabDiv.appendChild(titleSpan);
                tabDiv.appendChild(closeBtn);

                tabDiv.onclick = () => openFile(tabId);
                tabBar.appendChild(tabDiv);
            });
        }

        function createNewNode(parentFolder, type) {
            const name = prompt("Enter " + type + " name (e.g. main.cpp, script.py, index.html):");
            if (!name) return;

            const newNode = { id: generateId(), name: name, type: type };

            if (type === 'folder') {
                newNode.expanded = true;
                newNode.children = [];
            } else {
                fileContents[newNode.id] = "";
                // Provide basic boilerplates
                if (name.endsWith('.cpp')) fileContents[newNode.id] = "#include <iostream>\n\nint main() {\n    std::cout << \"Hello from Atom Web!\" << std::endl;\n    return 0;\n}";
                if (name.endsWith('.py')) fileContents[newNode.id] = "print('Hello from Atom Web!')";
                if (name.endsWith('.html')) fileContents[newNode.id] = "<h1>Hello from Fake Browser!</h1>\n<style>\n  h1 { color: blue; }\n</style>";
            }

            parentFolder.children.push(newNode);
            parentFolder.expanded = true;
            renderTree();
            
            if (type === 'file') openFile(newNode.id);
        }

        function openFile(fileId) {
            if (activeFileId && editorInstance) {
                fileContents[activeFileId] = editorInstance.getValue();
            }

            if (!openTabs.includes(fileId)) {
                openTabs.push(fileId);
            }

            activeFileId = fileId;
            renderTree();
            renderTabs();
            updateStatusBar();

            if (editorInstance) {
                editorInstance.setValue(fileContents[fileId] || "", -1);
                const node = findNodeById(vfs, fileId);
                if (node) {
                    let ext = node.name.split('.').pop();
                    let lang = 'javascript';
                    if (ext === 'html') lang = 'html';
                    if (ext === 'css') lang = 'css';
                    if (ext === 'json') lang = 'json';
                    if (ext === 'py') lang = 'python';
                    if (ext === 'cpp' || ext === 'c') lang = 'c_cpp';
                    
                    editorInstance.session.setMode("ace/mode/" + lang);
                    document.getElementById('status-language').innerText = lang;
                }
            }
            document.getElementById('run-btn').style.display = 'block';
        }

        function closeTab(fileId) {
            if (activeFileId === fileId && editorInstance) {
                fileContents[fileId] = editorInstance.getValue();
            }
            
            openTabs = openTabs.filter(id => id !== fileId);
            
            if (activeFileId === fileId) {
                if (openTabs.length > 0) {
                    openFile(openTabs[openTabs.length - 1]);
                } else {
                    activeFileId = null;
                    if (editorInstance) editorInstance.setValue("", -1);
                    document.getElementById('status-filename').innerText = "No file selected";
                    document.getElementById('status-language').innerText = "Plain Text";
                    document.getElementById('run-btn').style.display = 'none';
                    renderTree();
                    renderTabs();
                }
            } else {
                renderTabs();
            }
        }

        function findNodeById(currentNode, id) {
            if (currentNode.id === id) return currentNode;
            if (currentNode.children) {
                for (let i = 0; i < currentNode.children.length; i++) {
                    let found = findNodeById(currentNode.children[i], id);
                    if (found) return found;
                }
            }
            return null;
        }

        function updateStatusBar() {
            if (activeFileId) {
                const node = findNodeById(vfs, activeFileId);
                if (node) {
                    document.getElementById('status-filename').innerText = node.name;
                }
            }
        }

        // --- Code Execution & Fake Browser Engine --- //

        document.getElementById('close-output').onclick = () => {
            document.getElementById('output-pane').style.display = 'none';
        };

        document.getElementById('run-btn').onclick = async () => {
            if (!activeFileId) return;
            
            // Auto-save before run
            fileContents[activeFileId] = editorInstance.getValue();
            const node = findNodeById(vfs, activeFileId);
            const code = fileContents[activeFileId];
            const ext = node.name.split('.').pop();
            
            const outputPane = document.getElementById('output-pane');
            const terminal = document.getElementById('terminal-output');
            const browser = document.getElementById('browser-preview');
            const outputTitle = document.getElementById('output-title');

            outputPane.style.display = 'flex';

            // Fake Browser Execution (HTML)
            if (ext === 'html') {
                outputTitle.innerText = "Fake Browser Preview";
                terminal.style.display = 'none';
                browser.style.display = 'block';
                browser.srcdoc = code;
                return;
            }

            // Backend Execution (Python, C++)
            outputTitle.innerText = "Terminal Output - Running...";
            browser.style.display = 'none';
            terminal.style.display = 'block';
            terminal.innerText = "Connecting to compiler...\n";

            let apiLang = '';
            let apiVersion = '*';

            if (ext === 'py') { apiLang = 'python'; apiVersion = pistonRuntimes['python'] || '3.10.0'; }
            else if (ext === 'cpp' || ext === 'c') { apiLang = 'c++'; apiVersion = pistonRuntimes['c++'] || '10.2.0'; }
            else if (ext === 'js') { apiLang = 'javascript'; apiVersion = pistonRuntimes['javascript'] || '18.15.0'; }
            else {
                terminal.innerText = "Execution not supported for this file type.\nUse HTML, JS, PY, or CPP.";
                return;
            }

            try {
                const res = await fetch('https://emkc.org/api/v2/piston/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        language: apiLang,
                        version: apiVersion,
                        files: [{ name: node.name, content: code }]
                    })
                });
                
                const result = await res.json();
                outputTitle.innerText = "Terminal Output - Finished";
                
                if (result.run){
                    terminal.innerText = result.run.output || "Program finished with no output.";
                    if (result.run.code !== 0) {
                        terminal.innerText += "\n\nProcess exited with code " + result.run.code;
                        terminal.style.color = '#e06c75'; // Red for error
                    } else {
                        terminal.style.color = '#98c379'; // Green for success
                    }
                } else {
                    terminal.innerText = "Compilation Error:\n" + JSON.stringify(result);
                    terminal.style.color = '#e06c75';
                }
            } catch (error) {
                terminal.innerText = "Network error connecting to execution engine.";
                terminal.style.color = '#e06c75';
            }
        };

        // Initialize Ace Editor
        window.onload = function() {
            editorInstance = ace.edit("editor-container");
            editorInstance.setTheme("ace/theme/one_dark");
            editorInstance.session.setMode("ace/mode/javascript");
            
            // Apply VS Code Font to Ace Editor
            editorInstance.setOptions({
                fontFamily: "Consolas, 'Courier New', monospace",
                fontSize: "14px",
                showPrintMargin: false,
                wrap: true
            });

            editorInstance.setValue("// Atom IDE Engine Loaded\n// 1. Click +F to add a .py, .cpp, or .html file.\n// 2. Click 'Run File' below to execute.", -1);

            editorInstance.session.on('change', function() {
                if (activeFileId) {
                    fileContents[activeFileId] = editorInstance.getValue();
                }
            });

            renderTree();
            renderTabs();
        };
    </script>
</body>
</html>
